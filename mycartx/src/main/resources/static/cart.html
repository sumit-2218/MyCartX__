<h2>My Cart</h2>
<div id="cartItems"></div>

<script>
const API_BASE = "http://localhost:8080";
const USER_ID = localStorage.getItem("userId");
if (!USER_ID) {
    alert("Please login first");
    window.location.href = "login.html";
}

async function loadCart() {
    const response = await fetch(`${API_BASE}/api/cart/${USER_ID}`);
    const cartItems = await response.json();

    const container = document.getElementById("cartItems");
    container.innerHTML = "";

    cartItems.forEach(item => {
        container.innerHTML += `
            <div style="border:1px solid #ccc; padding:15px; margin:10px; border-radius:8px;">
                <img src="${API_BASE}/${item.imageUrl}" alt="${item.name}" width="120" style="display:block; margin-bottom:10px;">
                <h3>${item.name}</h3>
                <p>Price: ₹${item.price}</p>
                <p>Quantity: ${item.quantity}</p>
                <p><strong>Total: ₹${item.price * item.quantity}</strong></p>
            </div>
        `;
    });
}

loadCart();
</script>
