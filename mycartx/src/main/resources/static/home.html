<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
        }

        .nav-left {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-right a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .nav-right a:hover {
            text-decoration: underline;
        }

        h2 {
            padding: 15px 20px 0 20px;
        }

        .products {
            padding: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .card {
            border: 1px solid #ccc;
            padding: 10px;
            width: 200px;
        }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-left">MyCartX</div>
    <div class="nav-right">
        <a href="home.html">Home</a>
        <a href="cart.html">Cart 🛒</a>
        <a href="profile.html">Profile 👤</a>
    </div>
</div>

<h2>Products</h2>

<div id="productContainer" class="products"></div>
<p id="error"></p>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const API_BASE = "http://localhost:8080";

    fetch(`${API_BASE}/api/products`)
        .then(res => {
            if (!res.ok) {
                throw new Error("API failed with status " + res.status);
            }
            return res.json();
        })
        .then(products => {
            console.log("Products received:", products);

            const container = document.getElementById("productContainer");
            container.innerHTML = "";

            if (!products || products.length === 0) {
                container.innerHTML = "<p>No products available</p>";
                return;
            }

            products.forEach(p => {
                const card = document.createElement("div");
                card.className = "card";

                const imagePath = p.imageUrl ? `${API_BASE}/${p.imageUrl}` : `${API_BASE}/no-image.png`;

                card.innerHTML = `
                    <img src="${imagePath}" alt="${p.name}">
                    <h4>${p.name}</h4>
                    <p>${p.description || ""}</p>
                    <p><b>₹${p.price}</b></p>
                   <button onclick="addToCart(${p.id})">Add to Cart</button>
                `;

                container.appendChild(card);
            });
        })
        .catch(err => {
            document.getElementById("error").innerText =
                "Failed to load products. Please try again.";
            console.error("Fetch error:", err);
        });

});

//this is the backend for cart🛒

async function addToCart(productId) {

    const API_BASE = "https://aetiological-confarreate-lyle.ngrok-free.dev";
    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("Please login first");
        return;
    }

    try {
        const response = await fetch(
            `${API_BASE}/api/cart/add?userId=${userId}&productId=${productId}`,
            {
                method: "POST"
            }
        );

        if (response.ok) {
            alert("Product added to cart ✅");
        } else {
            alert("Failed to add to cart ❌");
        }

    } catch (error) {
        console.error(error);
    }
}
</script>

</body>
</html>
